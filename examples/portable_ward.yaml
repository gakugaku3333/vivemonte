# ポータブル撮影（病室・胸部AP）のベースシーン — 周囲患者への散乱線評価向け
# 座標系: cm、z軸が鉛直上向き、床上面が z=0
#
# 構成: ベッド上の患者に移動型装置で胸部AP撮影。2m離れた隣のベッドに
# 別の患者（neighbor_patient=評価対象）。遮蔽なし（カーテンは無視できる）。
# 「ポータブル撮影で周囲の患者はどれだけ被ばくするか」という定番の
# 第三者被ばく評価の雛形。
#
# カスタマイズの起点:
#   - neighbor_patient の位置: ベッド間隔（実測値）に合わせる
#   - 介助者を評価するなら患者脇 50cm 程度に立位シリンダを追加

source:
  type: xray_tube
  kvp: 90
  filtration_mm_al: 2.5
  mas: 2.5                       # ポータブル胸部の代表値
  position: [0, 0, 170]          # 焦点: 受像面の100cm上
  direction: [0, 0, -1]          # 鉛直下向き（胸部AP）
  field:
    shape: rect
    size_cm: [35, 35]
    sid_cm: 100                  # 焦点-受像面距離

geometry:
  - name: patient_torso
    shape: cylinder
    material: soft_tissue
    axis: y                      # 仰臥位（体軸=y）
    radius_cm: 12
    height_cm: 60
    center: [0, 0, 82]           # カセッテ上面 z=70 に接地

  - name: patient_head
    shape: sphere
    material: soft_tissue
    radius_cm: 10
    center: [0, 45, 82]

  - name: cassette
    shape: box
    material: aluminum
    size_cm: [40, 40, 1]
    center: [0, 0, 69.5]         # 患者背面のカセッテ（受像面 z=70）

  - name: bed_board
    shape: box
    material: pmma               # ベッド床板（マットレスの減弱は無視）
    size_cm: [90, 200, 2]
    center: [0, 0, 68]

  - name: neighbor_patient
    shape: cylinder
    material: soft_tissue
    axis: y
    radius_cm: 12
    height_cm: 60
    center: [200, 0, 82]         # 2m離れた隣ベッドの患者（評価対象）

  - name: neighbor_bed_board
    shape: box
    material: pmma
    size_cm: [90, 200, 2]
    center: [200, 0, 68]

  - name: floor
    shape: box
    material: concrete
    size_cm: [600, 400, 15]
    center: [100, 0, -7.5]

n_histories: 1.0e+6
